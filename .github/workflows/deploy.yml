name: Build and Release

on:
  push:
    branches: ["**"]
  workflow_dispatch:

# הגדרת מקביליות כדי למנוע התנגשויות בפריסה
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # --- תהליך הבנייה (רץ על כל ענף) ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          cp dist/index.html output/commentary-processor.html
          cp -r dist/* output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: commentary-processor-bundle
          path: output/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # --- תהליך הפריסה והשחרור (רץ רק בענף הראשי) ---
  deploy:
    # מתנה את הריצה בהצלחה של תהליך ה-build
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    # הרשאות ממוקדות רק לתהליך הזה
    permissions:
      contents: write
      pages: write
      id-token: write
      
    # חיבור ללוח הבקרה של הסביבות ב-GitHub
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: commentary-processor-bundle
          path: output/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/commentary-processor.html
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Automated release for Commentary Processor.
            Download the standalone HTML file below.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
